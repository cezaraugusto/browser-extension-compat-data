name: Update MDN WebExtensions compat data

on:
  schedule:
    - cron: '0 0 * * *' # every day at 00:00 UTC
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout MDN browser-compat-data (webextensions only)
        uses: actions/checkout@v4
        with:
          repository: mdn/browser-compat-data
          path: mdn-bcd
          fetch-depth: 1
          sparse-checkout: |
            /package.json
            webextensions/manifest
            webextensions/api
            webextensions/permissions
          sparse-checkout-cone-mode: false

      - name: Build compact index + key types
        run: node scripts/build-index.mjs mdn-bcd/webextensions src/generated/index.json

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit and push if changes
        run: |
          git add src/generated/index.json src/generated/keys.ts
          if git diff --cached --quiet; then
            echo "No changes detected. Skipping commit."
            exit 0
          fi
          git commit -m "chore(data): auto-sync MDN WebExtensions compat index"
          git push
